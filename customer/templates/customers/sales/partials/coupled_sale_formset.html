{% load humanize %}
<div id="coupled-formset-container">
  {{ formset.management_form }}
  <div class="space-y-4" id="coupled-items-container">
    {% for form in formset %}
      {% include 'customers/sales/partials/coupled_sale_row.html' with form=form %}
    {% endfor %}
  </div>

  <button type="button"
          hx-post="{% url 'normal_sale_coupled_add' %}"
          hx-include="closest form"
          hx-target="#coupled-formset-container"
          hx-swap="outerHTML"
          class="mt-4 text-sm text-brand-600 hover:text-brand-700 font-bold flex items-center gap-1.5 transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
    </svg>
    Add Serialized Item
  </button>
</div>
