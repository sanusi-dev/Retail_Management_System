{% if products %}
    <ul class="absolute z-50 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-60 overflow-y-auto mt-1">
        {% for product in products %}
            <li class="px-4 py-2 hover:bg-indigo-50 cursor-pointer transition-colors border-b border-gray-100 last:border-b-0"
                onclick="selectProduct(this, '{{ product.pk }}', '{{ product.modelname|escapejs }} ({{ product.sku }})')">
                <div class="font-medium text-gray-900">{{ product.modelname | upper }} | {{ product.brand.name | upper }}</div>
                <div class="text-xs text-gray-400 mt-0.5">Available: {{ product.stock_on_hand }}</div>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <div class="absolute z-50 w-full bg-white border border-gray-300 rounded-md shadow-lg p-3 mt-1 text-sm text-gray-500 text-center">
        No items found.
    </div>
{% endif %}
