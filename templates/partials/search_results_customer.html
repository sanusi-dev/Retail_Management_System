{% if customers %}
    <ul class="absolute z-50 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-60 overflow-y-auto mt-1">
        {% for customer in customers %}
        <li class="px-4 py-2 hover:bg-indigo-50 cursor-pointer transition-colors border-b border-gray-100 last:border-b-0"
            onclick="selectCustomer('{{ customer.pk }}', '{{ customer.full_name|escapejs }} | {{ customer.phone }}')">
            <div class="font-medium text-gray-900">{{ customer.full_name }}</div>
            <div class="text-xs text-gray-500">{{ customer.phone }} {% if customer.customer_number %}- {{ customer.customer_number }}{% endif %}</div>
        </li>
        {% endfor %}
    </ul>
{% else %}
    <div class="absolute z-50 w-full bg-white border border-gray-300 rounded-md shadow-lg p-4 mt-1 text-sm text-gray-500">
        No customers found. <span class="text-indigo-600 font-medium cursor-pointer" onclick="useNewName()">Use as New Name</span>
    </div>
{% endif %}
